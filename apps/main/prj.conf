CONFIG_WIFI=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_GATT=y
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=20
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_MQTT_LIB=y
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Soil moisture calibration — must be characterised per-probe (DD-MA-12)
CONFIG_SOIL_DRY_ADC=3000
CONFIG_SOIL_WET_ADC=1500
CONFIG_RETAINED_MEM=y
CONFIG_RTC=y
CONFIG_SNTP=y
